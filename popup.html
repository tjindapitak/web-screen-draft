<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">

    <div class="body">

      <!-- Edit mode toggle -->
      <button id="toggleEdit" class="power-btn">
        <div class="power-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 3v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M7.5 6.8A8 8 0 1 0 16.5 6.8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="power-text">
          <span class="power-label">Edit Mode</span>
          <span class="power-status" id="statusLabel">Off</span>
        </div>
        <div class="power-indicator" id="statusDot"></div>
      </button>

      <!-- Screenshot section -->
      <div class="card">
        <div class="card-head">
          <span class="card-title">Screenshot</span>
          <label class="toggle-row">
            <div class="toggle-left">
              <span>Show Highlights</span>
            </div>
            <input type="checkbox" id="showHighlights" checked>
            <span class="switch"></span>
          </label>
        </div>

        <div class="seg-toggle" id="modeToggle">
          <button class="seg-btn active" data-mode="changes">Changes only</button>
          <button class="seg-btn" data-mode="sidebyside">Side by side</button>
        </div>

        <div class="btn-pair">
          <button id="captureViewport" class="cap-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <rect x="2" y="4" width="20" height="14" rx="3" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="12" cy="11" r="3" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            <span>Current Viewport</span>
          </button>
          <button id="captureFullPage" class="cap-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <rect x="5" y="1" width="14" height="22" rx="2.5" stroke="currentColor" stroke-width="1.5"/>
              <line x1="8" y1="6" x2="16" y2="6" stroke="currentColor" stroke-width="1" opacity="0.4"/>
              <line x1="8" y1="9" x2="14" y2="9" stroke="currentColor" stroke-width="1" opacity="0.4"/>
              <line x1="8" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="1" opacity="0.25"/>
            </svg>
            <span>Full Page</span>
          </button>
        </div>
      </div>

      <!-- Quick actions -->
      <div class="quick-row">
        <button id="blankCanvas" class="quick-btn" title="Open a blank drawing canvas">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M12 8v8M8 12h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span>Blank Canvas</span>
        </button>
        <div class="quick-sep"></div>
        <button id="resetChanges" class="quick-btn quick-danger" title="Reset all edits on this page">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <path d="M3 3v6h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4 9a9 9 0 1 1-.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span>Reset All</span>
        </button>
      </div>

    </div>

    <!-- Footer -->
    <footer class="foot">
      <span class="shortcut-hint">
        <kbd>&#8984;&#8679;E</kbd> toggle edit
      </span>
      <a href="https://buymeacoffee.com/tjindapitak" target="_blank" class="coffee" title="Buy me a coffee">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M3 14c0 3.3 2.7 6 6 6h4c3.3 0 6-2.7 6-2V9H3v5z" fill="#ffdd00" stroke="#c8960c" stroke-width="1.2" stroke-linejoin="round"/>
          <path d="M19 10c1.7 0 3 1.3 3 3s-1.3 3-3 3" stroke="#c8960c" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M3 9h16" stroke="#c8960c" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M8 6c0-.8.6-1.6 1.2-2" stroke="#ff6723" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M12 5c0-.8.6-1.6 1.2-2" stroke="#ff6723" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        <span>Buy me a coffee</span>
      </a>
    </footer>

  </div>
  <script src="popup.js"></script>
</body>
</html>
